allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url "${project(':background_fetch').projectDir}/libs" }
    }
}

subprojects {
    configurations.all {
        resolutionStrategy.eachDependency { details ->
            if (details.requested.group == 'androidx.lifecycle') {
                if (details.requested.name == 'lifecycle-extensions') {
                    details.useVersion '2.2.0'
                } else {
                    details.useVersion '2.6.2'
                }
            }
            if (details.requested.group == 'com.transistorsoft' &&
                details.requested.name == 'tsbackgroundfetch') {
                details.useVersion '1.0.4'
            }
        }
    }
}
rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

ext.kotlin_version = "1.8.0"

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
